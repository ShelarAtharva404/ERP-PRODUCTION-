apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-backend
  labels:
    app: erp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: erp-backend
  template:
    metadata:
      labels:
        app: erp-backend
    spec:
      containers:
      - name: erp-backend
        # In a real CI/CD pipeline, the image tag will be updated dynamically
        image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/erp-backend:latest
        ports:
        - containerPort: 5000
        env:
        # Define environment variables required by your Node.js app here
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: MONGO_URI
          # For production, it's better to use a Secret rather than plain text here
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: MONGO_URI
              optional: true # Set to false if you create the secret
---
apiVersion: v1
kind: Service
metadata:
  name: erp-backend-service
spec:
  type: ClusterIP
  selector:
    app: erp-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
