version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-server
    # Running as root is required locally so Jenkins can access the host's Docker socket
    # to build and push our ERP Docker images in the pipeline.
    user: root
    ports:
      - "8081:8080" # Jenkins UI will be at http://localhost:8081
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      # Mount the Docker socket so Jenkins can run 'docker build'
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_data:
